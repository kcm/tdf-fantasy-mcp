name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          # No registry-url — omitting it prevents setup-node from writing an
          # .npmrc token entry that would shadow npm's OIDC exchange. With
          # id-token: write above, npm detects the GitHub Actions environment
          # and exchanges the OIDC token with the registry automatically.

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public --provenance
